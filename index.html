                gossip: "<b>👑 黑料1：想當武則天2.0！</b><br>她是武則天最寵愛的女兒，從小看著媽媽當皇帝，野心也超級大。她權力最大時，朝廷裡七成的官員都是她的小弟，連皇帝哥哥都怕她！<br><br><b>📉 黑料2：鬥輸了自己的親侄子！</b><br>她太想掌控權力，結果惹到了年輕的侄子（後來的唐玄宗李隆基）。李隆基先下手為強，派兵把她的黨羽全部殺光，最後賜給她一條白綾逼她上吊自殺，女皇夢碎！" 
            },
            { 
                dynasty: "清朝", name: "溥儀", avatar: "🧳", title: "偷自己家東西的末代皇帝", color: "#34495e", likes: 0, 
                stats: { "亡國力": 100, "偷竊力": 95, "魁儡度": 100 }, 
                gossip: "<b>🖼️ 黑料1：把國寶偷偷運出皇宮！</b><br>他退位後還住在紫禁城裡，知道自己總有一天會被趕出去。他竟然和弟弟串通，每天把皇宮裡最值錢的古董、名畫（像是《清明上河圖》）藏在包裹裡偷偷運出宮賣錢，偷自己家的東西！<br><br><b>🎌 黑料2：跑去給日本人當魁儡！</b><br>被趕出皇宮後他不甘心，為了重新當上皇帝，竟然跑去東北投靠侵略中國的日本人，當了「偽滿洲國」的魁儡皇帝，成了被歷史唾棄的漢奸！" 
            }
        ];

        let currentTab = 'normal';
        
        function switchTab(tab) {
            currentTab = tab;
            const btnNormal = document.getElementById('btnNormal');
            const btnDark = document.getElementById('btnDark');
            const mainTitle = document.getElementById('mainTitle');
            const subTitle = document.getElementById('subTitle');

            document.getElementById('searchInput').value = '';

            if (tab === 'dark') {
                document.body.classList.add('dark-mode');
                btnDark.classList.add('active-dark');
                btnNormal.classList.remove('active-normal');
                mainTitle.innerText = "🛑 大樹古人歷史黑料禁區 🚫";
                subTitle.innerText = "注意：以下內容破壞人設，請小心服用！";
            } else {
                document.body.classList.remove('dark-mode');
                btnNormal.classList.add('active-normal');
                btnDark.classList.remove('active-dark');
                mainTitle.innerText = "📜 大樹古人八卦卡吃瓜區 🤫";
                subTitle.innerText = "來看看古代網紅們的真面目！";
            }
            
            renderCards(); 
            fetchLikes();  
        }

        function fetchLikes() {
            if (!db) return; 
            const peopleArray = currentTab === 'normal' ? normalPeople : darkPeople;
            const prefix = currentTab === 'dark' ? 'dark_' : '';

            db.collection('gossips').get().then((querySnapshot) => {
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const docId = doc.id;
                    peopleArray.forEach((person) => {
                        if (docId === prefix + person.name) {
                            person.likes = data.likes || 0;
                            const likeElement = document.getElementById(`likeCount_${person.name}`);
                            if (likeElement) likeElement.innerText = person.likes;
                        }
                    });
                });
            }).catch(error => console.log("無法取得資料"));
        }

        // 🌟 核心：產生卡片 (加入自動排序功能) 🌟
        function renderCards() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = ''; 
            
            const peopleArray = currentTab === 'normal' ? normalPeople : darkPeople;
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const filterDynasty = document.getElementById('dynastyFilter').value;

            // 1. 先過濾出符合搜尋與下拉選單的人物
            let filteredPeople = peopleArray.filter(person => {
                const matchName = person.name.toLowerCase().includes(searchText) || person.title.toLowerCase().includes(searchText);
                const matchDynasty = filterDynasty === 'all' || person.dynasty.includes(filterDynasty) || (filterDynasty==='上古' && person.dynasty==='商朝');
                return matchName && matchDynasty;
            });

            // 2. ⏳ 自動按歷史朝代排序 (核心黑科技)
            filteredPeople.sort((a, b) => {
                let indexA = dynastyTimeline.indexOf(a.dynasty);
                let indexB = dynastyTimeline.indexOf(b.dynasty);
                
                // 如果找不到完全一樣的，就找包含的關鍵字
                if (indexA === -1) indexA = dynastyTimeline.findIndex(d => a.dynasty.includes(d));
                if (indexB === -1) indexB = dynastyTimeline.findIndex(d => b.dynasty.includes(d));
                
                // 如果真的都找不到（例如打錯字），就把他排到最後面
                if (indexA === -1) indexA = 999;
                if (indexB === -1) indexB = 999;
                
                return indexA - indexB;
            });

            if (filteredPeople.length === 0) {
                container.innerHTML = `<div class="no-result">😭 找不到符合條件的古人，換個關鍵字或朝代試試看吧！</div>`;
                return;
            }

            // 畫出過濾且排序後的卡片
            filteredPeople.forEach((person) => {
                let statsHtml = '';
                for (let statName in person.stats) {
                    let statValue = person.stats[statName];
                    statsHtml += `
                        <div class="stat-row">
                            <div class="stat-label">${statName}</div>
                            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${statValue}%; background: ${person.color}"></div></div>
                        </div>`;
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(person.name);
                
                card.innerHTML = `
                    <div class="dynasty">${person.dynasty}</div>
                    <div class="avatar">${person.avatar}</div>
                    <div class="name">${person.name}</div>
                    <div class="title" style="color:${currentTab === 'dark' ? '#ff3f34' : ''}">${person.title}</div>
                    <div class="stats-container">${statsHtml}</div>
                    <div class="like-section">
                        <button class="like-btn" onclick="addLike(event, '${person.name}')">❤️</button>
                        <span class="like-count" id="likeCount_${person.name}">${person.likes || 0}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function addLike(event, personName) {
            event.stopPropagation();
            const peopleArray = currentTab === 'normal' ? normalPeople : darkPeople;
            const person = peopleArray.find(p => p.name === personName);
            
            if (!person) return;

            person.likes = (person.likes || 0) + 1;
            document.getElementById(`likeCount_${person.name}`).innerText = person.likes;
            
            const btn = event.target;
            btn.style.transform = "scale(1.5)";
            setTimeout(() => { btn.style.transform = "scale(1)"; }, 200);

            if (db) {
                const prefix = currentTab === 'dark' ? 'dark_' : '';
                db.collection('gossips').doc(prefix + person.name).set({ likes: person.likes }, { merge: true });
            }
        }

        function openModal(personName) {
            const peopleArray = currentTab === 'normal' ? normalPeople : darkPeople;
            const person = peopleArray.find(p => p.name === personName);
            
            if (!person) return;

            const modalName = document.getElementById('modalName');
            modalName.innerText = `【${person.dynasty} · ${person.name}】的${currentTab === 'dark' ? '黑歷史' : '最高機密'}`;
            modalName.style.color = currentTab === 'dark' ? '#ffdd59' : '#2f3542';
            document.getElementById('stampText').innerText = currentTab === 'dark' ? '人設崩壞 WARNING' : '絕對機密 TOP SECRET';
            document.getElementById('modalGossip').innerHTML = person.gossip;
            document.getElementById('gossipModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('gossipModal').style.display = 'none'; }
        window.onclick = function(event) { if (event.target == document.getElementById('gossipModal')) closeModal(); }

        switchTab('normal');
    </script>
</body>
